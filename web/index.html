<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beavoguix Web</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>Beavoguix</h1>
        <span id="status" class="status">Connexion...</span>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer">
        <div class="prompt-box">
          <textarea
            id="prompt"
            name="prompt"
            rows="1"
            placeholder="Demande a Beavoguix de coder, expliquer ou modifier tes fichiers..."
            autocomplete="off"
          ></textarea>
          <button type="submit">Envoyer</button>
        </div>
      </form>

      <footer>Créé par Barre BEAVOGUI, étudiant en Polytech</footer>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
